<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — Agile AI Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--accent:#059669;--accent-light:#10b981;--indigo:#4338ca;--text:#f8fafc;--text-muted:#94a3b8;--border-strong:rgba(148,163,184,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e1b4b 50%,#064e3b);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.card{max-width:480px;background:linear-gradient(145deg,rgba(30,41,59,0.6),rgba(15,23,42,0.8));border:1px solid var(--border-strong);border-radius:20px;padding:2.5rem}
.check{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.5rem}
h1{font-size:1.6rem;font-weight:800;margin-bottom:.6rem}
p{color:var(--text-muted);font-size:.95rem;line-height:1.6;margin-bottom:1rem}
.btn{display:inline-block;margin-top:1rem;padding:.9rem 2rem;font-weight:700;border-radius:11px;text-decoration:none;background:linear-gradient(135deg,var(--accent),var(--indigo));color:#fff}
.muted{font-size:.82rem;color:#64748b;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1 id="title">Payment received 🎉</h1>
  <p id="body">Your Smart Support account is being set up. We've sent your login details and your website widget code to your email.</p>
  <a class="btn" href="https://support-smartsolns.com/login">Go to login →</a>
  <p class="muted">Didn't get the email? Check spam, or contact info@agileaisystems.com</p>
</div>
<script>
// Poll provisioning status if we have a session/signup id
const API=(location.hostname.includes('agileaisystems.com'))?'https://support-smartsolns.com/api/signup':'/api/signup';
const sid=new URLSearchParams(location.search).get('signup_id');
if(sid){
  let tries=0;
  const poll=setInterval(async()=>{
    tries++;
    try{
      const r=await fetch(API+'/status?signup_id='+sid); const d=await r.json();
      if(d.status==='provisioned'){ clearInterval(poll); document.getElementById('body').textContent='Your account ('+d.tenant_code+') is ready. Check your email for login details.'; }
    }catch(e){}
    if(tries>20) clearInterval(poll);
  },3000);
}
</script>
</body>
</html>
